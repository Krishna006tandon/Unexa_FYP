# Nginx reverse proxy for Node-Media-Server HLS (HTTPS)
#
# Upstream: Node-Media-Server HTTP at 127.0.0.1:8000
# Public: https://hls.yourdomain.com
#
# Notes:
# - HLS playlist (.m3u8) should not be cached aggressively
# - Segments (.ts) can be cached long
# - CORS must allow mobile clients

server {
  listen 80;
  server_name hls.yourdomain.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name hls.yourdomain.com;

  # Use certbot/letsencrypt to generate these paths
  ssl_certificate     /etc/letsencrypt/live/hls.yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hls.yourdomain.com/privkey.pem;

  client_max_body_size 0;

  location / {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "*" always;
    if ($request_method = OPTIONS) { return 204; }
  }

  # Playlists: short cache
  location ~* \.m3u8$ {
    proxy_pass http://127.0.0.1:8000;
    add_header Cache-Control "public, max-age=5" always;
    add_header Access-Control-Allow-Origin "*" always;
  }

  # Segments: long cache
  location ~* \.ts$ {
    proxy_pass http://127.0.0.1:8000;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Access-Control-Allow-Origin "*" always;
  }
}

