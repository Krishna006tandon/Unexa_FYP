services:
  # Frontend Web App
  - type: web
    name: unexa-frontend
    env: static
    plan: free
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://unexa-fyp.onrender.com
      - key: NODE_ENV
        value: production
    buildCommand: cd frontend && npm install && npm run build:web
    staticPublishPath: ./frontend/dist
