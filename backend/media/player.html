<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UNEXA HLS Player</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --card: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --text-dim: #a0a0a0;
        --primary: #7b61ff;
        --accent: #ff3b5c;
      }
      html,
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      }
      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      input {
        flex: 1;
        min-width: 260px;
        height: 42px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        padding: 0 12px;
        outline: none;
      }
      button {
        height: 42px;
        border: 0;
        border-radius: 14px;
        padding: 0 14px;
        font-weight: 800;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }
      .hint {
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 10px;
        line-height: 18px;
      }
      video {
        width: 100%;
        margin-top: 14px;
        border-radius: 18px;
        background: #000;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid rgba(255, 59, 92, 0.25);
        background: rgba(255, 59, 92, 0.12);
        font-weight: 900;
        color: var(--accent);
        margin-bottom: 12px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge"><span class="dot"></span>HLS Player (Chrome/Android needs hls.js)</div>
      <div class="card">
        <div class="row">
          <input id="src" placeholder="Paste .m3u8 URL (e.g. /live/abc123xyz/index.m3u8)" />
          <button id="load">Load</button>
        </div>
        <div class="hint">
          Safari plays HLS natively. Chrome/Edge needs hls.js (loaded from CDN). If you’re offline, use VLC instead.
        </div>
        <video id="video" controls playsinline></video>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <script>
      const params = new URLSearchParams(location.search);
      const defaultSrc = params.get('src') || '/live/abc123xyz/index.m3u8';
      const input = document.getElementById('src');
      const video = document.getElementById('video');
      const btn = document.getElementById('load');

      input.value = defaultSrc;

      function load(src) {
        if (!src) return;
        // If browser supports HLS natively (Safari)
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = src;
          video.play().catch(() => {});
          return;
        }
        // Chrome/Edge/Android
        if (window.Hls && Hls.isSupported()) {
          const hls = new Hls({ lowLatencyMode: true });
          hls.loadSource(src);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
          hls.on(Hls.Events.ERROR, (e, data) => console.log('hls.js error', data));
          return;
        }
        alert('HLS not supported in this browser. Use Safari or VLC.');
      }

      btn.addEventListener('click', () => load(input.value.trim()));
      load(defaultSrc);
    </script>
  </body>
</html>
